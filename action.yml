# Composite action: install the bump CLI from GitHub Releases for the host OS/arch.
# Usage (repo root contains bump/):
#   - uses: ./bump
# Published:
#   - uses: launchfirestorm/bump@v1
name: install-bump
description: Install bump CLI from GitHub Releases (Linux, macOS, Windows; amd64/arm64)
author: tony

branding:
  icon: tag
  color: blue

inputs:
  github-token:
    description: Token for api.github.com (avoids unauthenticated rate limits on CI). Defaults to the workflow GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Install bump (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: bash "${GITHUB_ACTION_PATH}/install/get_bump.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Install bump (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        & "${env:GITHUB_ACTION_PATH}/install/get_bump.ps1"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
