# bump v6 semver schema (removed in v7)
[semver.format]
prefix = "v"
delimiter = "."
timestamp = "%Y-%m-%d %H:%M:%S %Z"

[semver.version]
major = 1
minor = 2
patch = 3
candidate = 0

[semver.candidate]
promotion = "minor"
delimiter = "-rc"

[semver.development]
promotion = "git_sha"
delimiter = "+"
