[package]
name = "bump"
version = "6.0.5"
edition = "2024"
rust-version = "1.85"
authors = ["Tony B"]
description = "Un-opinionated automatic versioning"
license = "MIT"
repository = "https://github.com/launchfirestorm/bump"
homepage = "https://github.com/launchfirestorm/bump"
readme = "README.md"
keywords = ["cli", "versioning", "semver", "calver"]
categories = ["command-line-utilities", "development-tools"]

[[bin]]
name = "bump"
path = "src/main.rs"

[dependencies]
chrono = { version = "0.4.42", features = ["clock"] }
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"
toml_edit = "0.23"

[dev-dependencies]
tempfile = "3"
